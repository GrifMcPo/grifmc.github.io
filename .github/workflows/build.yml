name: Build Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn -B clean package --file plugin/pom.xml

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: RegisterPlugin
        path: plugin/target/RegisterPlugin.jar

    - name: Upload to releases
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        tag_name: v1.0.0
        files: plugin/target/RegisterPlugin.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
