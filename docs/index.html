<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Регистрация на сервер</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- Частицы -->
<div class="particles" id="particles"></div>

<!-- RGB рамка экрана -->
<div class="screen-border"></div>

<!-- Контейнер с панелью -->
<div class="container" id="app">
    <!-- Заголовок -->
    <div class="header-glow"></div>
    <div class="logo-area">
        <div class="logo-icon">⚡</div>
        <h1 class="rgb-text">Регистрация на сервере</h1>
        <p class="subtitle">Заполните форму для получения доступа</p>
        <div class="badges">
            <span class="badge">🔥 Онлайн</span>
            <span class="badge">🛡️ Защищено</span>
            <span class="badge">⚡ Быстро</span>
        </div>
    </div>

    <!-- Форма регистрации -->
    <form id="register-form">
        <div class="form-group">
            <label for="telegram-id">
                <span class="label-icon">📱</span>
                Telegram ID
                <span class="tooltip" title="Напишите боту !id для получения вашего ID">❓</span>
            </label>
            <div class="input-wrapper">
                <input type="text" id="telegram-id" placeholder="Например: 123456789" required>
                <div class="input-glow"></div>
            </div>
            <small class="hint">Для получения ID напишите боту <strong>!id</strong></small>
        </div>

        <div class="form-group">
            <label for="nickname">
                <span class="label-icon">⛏️</span>
                Ник на сервере
            </label>
            <div class="input-wrapper">
                <input type="text" id="nickname" placeholder="Ваш Minecraft ник" required>
                <div class="input-glow"></div>
            </div>
        </div>

        <div class="form-group">
            <label for="site-nick">
                <span class="label-icon">👤</span>
                Ник на сайте
            </label>
            <div class="input-wrapper">
                <input type="text" id="site-nick" placeholder="Как вас называть на сайте" required>
                <div class="input-glow"></div>
            </div>
        </div>

        <div class="form-group">
            <label for="site-id">
                <span class="label-icon">🆔</span>
                ID на сайте (для друзей)
            </label>
            <div class="input-wrapper">
                <input type="text" id="site-id" placeholder="Придумайте уникальный ID" required>
                <div class="input-glow"></div>
            </div>
            <small class="hint">Уникальный идентификатор, чтобы друзья могли вас найти</small>
        </div>

        <button type="submit" id="register-btn" class="btn-primary">
            <span class="btn-text">🚀 Зарегистрироваться</span>
            <span class="btn-shimmer"></span>
        </button>
    </form>

    <!-- Поле для кода -->
    <div id="code-section" style="display: none;">
        <div class="code-header">
            <div class="code-icon">🔐</div>
            <h3>Введите код подтверждения</h3>
            <p class="hint">Код отправлен в чат сервера</p>
        </div>
        <div class="form-group">
            <div class="input-wrapper">
                <input type="text" id="code-input" placeholder="Код из 5 цифр" maxlength="5" style="text-align:center;letter-spacing:0.5em;font-size:1.4em;">
                <div class="input-glow"></div>
            </div>
        </div>
        <button id="verify-btn" class="btn-primary">
            <span class="btn-text">✅ Подтвердить</span>
            <span class="btn-shimmer"></span>
        </button>
        <p id="code-status"></p>
    </div>

    <!-- Сообщение о статусе -->
    <div id="message"></div>

    <!-- Кнопка в главное меню -->
    <div id="goto-main" style="display:none; margin-top:20px;">
        <a href="main.html" class="btn-primary" style="display:block;text-align:center;text-decoration:none;">
            <span class="btn-text">🎮 Перейти на сайт</span>
            <span class="btn-shimmer"></span>
        </a>
    </div>
</div>

<!-- Версия -->
<div class="version-label">v2.0 RGB Edition</div>

<script src="firebase-config.js"></script>
<script src="script.js"></script>

<script>
// Генерация частиц
(function() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = (6 + Math.random() * 8) + 's';
        p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
        p.style.opacity = 0.6 + Math.random() * 0.4;
        container.appendChild(p);
    }
})();
</script>

</body>
</html>
