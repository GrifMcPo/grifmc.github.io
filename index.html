<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация на сервер</title>
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="container">
        <h1>🎮 Регистрация на сервере</h1>
        <p class="subtitle">Заполните форму для регистрации</p>

        <!-- Форма регистрации -->
        <form id="register-form">
            <div class="form-group">
                <label for="telegram-id">Telegram ID <span class="tooltip">❓</span></label>
                <input type="text" id="telegram-id" placeholder="Например: 123456789" required>
                <small class="hint">Для получения ID напишите боту <strong>!id</strong></small>
            </div>

            <div class="form-group">
                <label for="nickname">Ник на сервере</label>
                <input type="text" id="nickname" placeholder="Ваш Minecraft ник" required>
            </div>

            <div class="form-group">
                <label for="site-nick">Ник на сайте</label>
                <input type="text" id="site-nick" placeholder="Как вас называть на сайте" required>
            </div>

            <div class="form-group">
                <label for="site-id">ID на сайте (для друзей)</label>
                <input type="text" id="site-id" placeholder="Придумайте ID" required>
                <small class="hint">Уникальный идентификатор, чтобы друзья могли вас найти</small>
            </div>

            <button type="submit" id="register-btn">Зарегистрироваться</button>
        </form>

        <!-- Поле для кода (появляется после отправки) -->
        <div id="code-section" style="display: none;">
            <h3>🔐 Введите код подтверждения</h3>
            <p class="hint">Мы отправили 5-значный код в Telegram</p>
            <div class="form-group">
                <input type="text" id="code-input" placeholder="Код из 5 цифр" maxlength="5">
            </div>
            <button id="verify-btn">Подтвердить</button>
            <p id="code-status"></p>
        </div>

        <!-- Сообщение о статусе -->
        <div id="message"></div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="script.js"></script>

</body>
</html>
